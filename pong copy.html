<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            background: linear-gradient(135deg, #ff4e50 0%, #f9d423 100%);
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        #game-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            max-width: 95vw;
            max-height: 95vh;
        }
        
        #score { 
            color: #fff; 
            font-size: 1.5em; 
            margin-bottom: 15px; 
            font-weight: bold;
        }
        
        #restart { 
            margin: 10px; 
            padding: 10px 20px; 
            font-size: 0.9em; 
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: #fff; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        #restart:hover { 
            transform: translateY(-2px);
        }
        
        #instructions { 
            color: #fff; 
            font-size: 0.9em; 
            margin-top: 15px; 
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }
        
        canvas { 
            background: rgba(0, 0, 0, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            transition: all 0.3s ease;
            max-width: 100%;
            max-height: 70vh;
        }
        
        canvas:hover {
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .game-title {
            color: #fff;
            font-size: 2em;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease-in-out infinite;
        }
        
        #controls {
            margin: 15px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .difficulty-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        .difficulty-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .difficulty-btn.active {
            background: linear-gradient(45deg, #4ecdc4, #45b7d1);
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        #speed-display {
            color: #fff;
            font-size: 1.2em;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 15px;
            display: inline-block;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        #game-container {
            animation: fadeInUp 0.8s ease-out;
        }
        
        @media (max-width: 768px) {
            #game-container {
                padding: 15px;
            }
            
            .game-title {
                font-size: 1.5em;
            }
            
            #score {
                font-size: 1.2em;
            }
            
            #restart {
                padding: 8px 16px;
                font-size: 0.8em;
            }
            
            #instructions {
                font-size: 0.8em;
                padding: 8px;
            }
            
            .difficulty-btn {
                padding: 6px 12px;
                font-size: 0.8em;
            }
            
            #speed-display {
                font-size: 1em;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body style="background: linear-gradient(135deg, #ff4e50 0%, #f9d423 100%);">
    <div id="game-container">
        <div class="game-title">🏓 Pong</div>
        <div id="score">Player: 0 | AI: 0</div>
        <div id="speed-display">Speed: 5</div>
        <div id="controls">
            <button class="difficulty-btn active" onclick="setDifficulty('easy')">Easy</button>
            <button class="difficulty-btn" onclick="setDifficulty('medium')">Medium</button>
            <button class="difficulty-btn" onclick="setDifficulty('hard')">Hard</button>
        </div>
        <button id="restart">Restart Game</button>
        <canvas id="pong" width="800" height="500"></canvas>
        <div id="instructions">
            <strong>Controls:</strong><br>
            Use W/S or Up/Down Arrow Keys to move paddle<br>
            <strong>Goal:</strong> Beat the AI by scoring 11 points first!
        </div>
    </div>
    <script>
        const canvas = document.getElementById('pong');
        const ctx = canvas.getContext('2d');
        
        // Responsive canvas sizing
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth * 0.8, 800);
            const maxHeight = Math.min(window.innerHeight * 0.6, 500);
            const aspectRatio = 1.6; // width/height ratio
            
            let newWidth, newHeight;
            if (maxWidth / maxHeight > aspectRatio) {
                newHeight = maxHeight;
                newWidth = maxHeight * aspectRatio;
            } else {
                newWidth = maxWidth;
                newHeight = maxWidth / aspectRatio;
            }
            
            canvas.width = newWidth;
            canvas.height = newHeight;
            
            // Recalculate paddle and ball sizes
            paddleHeight = Math.floor(newHeight * 0.2);
            paddleWidth = Math.floor(newWidth * 0.0125);
            ballSize = Math.floor(newWidth * 0.0125);
        }
        
        let paddleHeight = 100;
        let paddleWidth = 10;
        let ballSize = 10;
        
        let playerY = 150;
        let aiY = 150;
        let ballX = 300;
        let ballY = 200;
        let ballSpeedX = 5;
        let ballSpeedY = 3;
        let playerScore = 0;
        let aiScore = 0;
        let difficulty = 'easy';
        let gameRunning = true;
        let rallyLength = 0;

        function setDifficulty(level) {
            difficulty = level;
            document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            resetBall();
        }

        function resetBall() {
            ballX = canvas.width / 2;
            ballY = canvas.height / 2;
            ballSpeedX = (Math.random() > 0.5 ? 1 : -1) * (5 + Math.floor(rallyLength / 5));
            ballSpeedY = (Math.random() - 0.5) * 6;
            rallyLength = 0;
            updateSpeedDisplay();
        }

        function updateSpeedDisplay() {
            const speed = Math.abs(ballSpeedX) + Math.abs(ballSpeedY);
            document.getElementById('speed-display').innerText = `Speed: ${Math.round(speed)}`;
        }

        function drawPaddle(x, y, color) {
            const gradient = ctx.createLinearGradient(x, y, x + paddleWidth, y + paddleHeight);
            gradient.addColorStop(0, color);
            gradient.addColorStop(1, adjustBrightness(color, -30));
            
            ctx.fillStyle = gradient;
            ctx.fillRect(x, y, paddleWidth, paddleHeight);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, paddleWidth, paddleHeight);
        }
        
        function adjustBrightness(color, percent) {
            const num = parseInt(color.replace("#",""), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return "#" + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 + (G<255?G<1?0:G:255)*0x100 + (B<255?B<1?0:B:255)).toString(16).slice(1);
        }

        function drawBall() {
            const gradient = ctx.createRadialGradient(ballX, ballY, 0, ballX, ballY, ballSize);
            gradient.addColorStop(0, '#fff');
            gradient.addColorStop(1, '#ccc');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballSize, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function draw() {
            // Clear the entire canvas completely
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width/2, 0);
            ctx.lineTo(canvas.width/2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
            
            drawPaddle(10, playerY, '#4ecdc4');
            drawPaddle(canvas.width - 20, aiY, '#ff6b6b');
            drawBall();
        }

        function updateAI() {
            let targetY = aiY + paddleHeight/2;
            
            if (difficulty === 'easy') {
                if (ballY < targetY - 10) targetY -= 3;
                if (ballY > targetY + 10) targetY += 3;
            } else if (difficulty === 'medium') {
                if (ballY < targetY - 5) targetY -= 5;
                if (ballY > targetY + 5) targetY += 5;
            } else {
                const prediction = ballY + (ballSpeedY * (canvas.width - ballX) / ballSpeedX);
                targetY = prediction - paddleHeight/2;
            }
            
            aiY = Math.max(0, Math.min(canvas.height - paddleHeight, targetY));
        }

        function update() {
            if (!gameRunning) return;
            
            ballX += ballSpeedX;
            ballY += ballSpeedY;
            rallyLength++;
            
            if (ballY <= ballSize || ballY >= canvas.height - ballSize) {
                ballSpeedY = -ballSpeedY;
            }
            
            if (ballX <= paddleWidth + ballSize && ballY >= playerY && ballY <= playerY + paddleHeight) {
                ballSpeedX = -ballSpeedX;
                ballSpeedX += 0.5;
                ballSpeedY += (ballY - (playerY + paddleHeight/2)) * 0.1;
            }
            
            if (ballX >= canvas.width - paddleWidth - ballSize && ballY >= aiY && ballY <= aiY + paddleHeight) {
                ballSpeedX = -ballSpeedX;
                ballSpeedX -= 0.5;
                ballSpeedY += (ballY - (aiY + paddleHeight/2)) * 0.1;
            }
            
            if (ballX <= 0) {
                aiScore++;
                document.getElementById('score').innerText = `Player: ${playerScore} | AI: ${aiScore}`;
                resetBall();
            }
            if (ballX >= canvas.width) {
                playerScore++;
                document.getElementById('score').innerText = `Player: ${playerScore} | AI: ${aiScore}`;
                resetBall();
            }
            
            if (playerScore >= 11 || aiScore >= 11) {
                gameRunning = false;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.font = 'bold 2em Arial';
                ctx.textAlign = 'center';
                ctx.fillText(playerScore >= 11 ? 'You Win!' : 'AI Wins!', canvas.width/2, canvas.height/2 - 20);
                ctx.font = '1.2em Arial';
                ctx.fillText(`Final Score: ${playerScore} - ${aiScore}`, canvas.width/2, canvas.height/2 + 20);
            }
            
            updateAI();
            updateSpeedDisplay();
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                playerY = Math.max(0, playerY - 10);
            }
            if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
                playerY = Math.min(canvas.height - paddleHeight, playerY + 10);
            }
        });

        document.getElementById('restart').onclick = function() {
            playerScore = 0;
            aiScore = 0;
            playerY = canvas.height / 2 - paddleHeight / 2;
            aiY = canvas.height / 2 - paddleHeight / 2;
            gameRunning = true;
            document.getElementById('score').innerText = 'Player: 0 | AI: 0';
            resetBall();
        };

        window.addEventListener('resize', resizeCanvas);

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        resizeCanvas();
        gameLoop();
    </script>
</body>
</html>
