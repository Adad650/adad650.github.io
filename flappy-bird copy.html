<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        body { 
            background: linear-gradient(135deg, #ff4e50 0%, #f9d423 100%);
            display: flex; justify-content: center; align-items: center; height: 100vh; 
        }
        canvas { background: #87CEEB; border: 2px solid #fff; }
        #score { color: #fff; font-size: 1.5em; position: absolute; top: 20px; left: 20px; }
        #restart { position: absolute; top: 60px; left: 20px; font-size: 1em; }
        #instructions { color: #fff; font-size: 1em; position: absolute; top: 100px; left: 20px; max-width: 300px; }
    </style>
</head>
<body style="background: linear-gradient(135deg, #ff4e50 0%, #f9d423 100%);">
    <div id="score">Score: 0</div>
    <button id="restart">Restart</button>
    <div id="instructions">
        <strong>Controls:</strong><br>
        Press Space or Click to flap<br>
        <strong>Goal:</strong> Navigate through pipes!
    </div>
    <canvas id="flappy" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('flappy');
        const ctx = canvas.getContext('2d');
        
        let score = 0;
        let gameOver = false;
        let gameStarted = false;
        
        const bird = {
            x: 150,
            y: 300,
            velocity: 0,
            gravity: 0.5,
            jump: -8,
            size: 20
        };
        
        const pipes = [];
        const pipeWidth = 80;
        const pipeGap = 150;
        let pipeTimer = 0;
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                flap();
            }
        });
        
        canvas.addEventListener('click', flap);
        document.getElementById('restart').onclick = startGame;
        
        function flap() {
            if (!gameStarted) {
                gameStarted = true;
            }
            if (!gameOver) {
                bird.velocity = bird.jump;
            }
        }
        
        function createPipe() {
            const gapY = Math.random() * (canvas.height - pipeGap - 100) + 50;
            pipes.push({
                x: canvas.width,
                gapY: gapY,
                passed: false
            });
        }
        
        function update() {
            if (!gameStarted || gameOver) return;
            
            // Update bird
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;
            
            // Bird boundaries
            if (bird.y <= 0) {
                bird.y = 0;
                bird.velocity = 0;
            }
            if (bird.y >= canvas.height - bird.size) {
                gameOver = true;
            }
            
            // Create pipes
            pipeTimer++;
            if (pipeTimer > 120) {
                createPipe();
                pipeTimer = 0;
            }
            
            // Update pipes
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= 3;
                
                // Check collision
                if (bird.x + bird.size > pipes[i].x && 
                    bird.x < pipes[i].x + pipeWidth &&
                    (bird.y < pipes[i].gapY || bird.y + bird.size > pipes[i].gapY + pipeGap)) {
                    gameOver = true;
                }
                
                // Score points
                if (!pipes[i].passed && pipes[i].x + pipeWidth < bird.x) {
                    pipes[i].passed = true;
                    score++;
                    document.getElementById('score').innerText = 'Score: ' + score;
                }
                
                // Remove off-screen pipes
                if (pipes[i].x + pipeWidth < 0) {
                    pipes.splice(i, 1);
                }
            }
        }
        
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw bird
            ctx.fillStyle = '#FFD700';
            ctx.fillRect(bird.x, bird.y, bird.size, bird.size);
            
            // Draw pipes
            ctx.fillStyle = '#228B22';
            for (let pipe of pipes) {
                // Top pipe
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.gapY);
                // Bottom pipe
                ctx.fillRect(pipe.x, pipe.gapY + pipeGap, pipeWidth, canvas.height - pipe.gapY - pipeGap);
            }
            
            // Game over or start message
            if (!gameStarted) {
                ctx.fillStyle = '#fff';
                ctx.font = '2em Arial';
                ctx.fillText('Press Space or Click to Start', 200, 250);
            } else if (gameOver) {
                ctx.fillStyle = '#fff';
                ctx.font = '3em Arial';
                ctx.fillText('Game Over!', 300, 250);
                ctx.font = '1.5em Arial';
                ctx.fillText('Final Score: ' + score, 320, 300);
            }
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        function startGame() {
            score = 0;
            gameOver = false;
            gameStarted = false;
            bird.y = 300;
            bird.velocity = 0;
            pipes.length = 0;
            pipeTimer = 0;
            document.getElementById('score').innerText = 'Score: 0';
        }
        
        startGame();
        gameLoop();
    </script>
</body>
</html>
