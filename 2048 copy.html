<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            background: linear-gradient(135deg, #ff4e50 0%, #f9d423 100%);
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        #game-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            max-width: 95vw;
            max-height: 95vh;
        }
        
        #score { 
            color: #fff; 
            font-size: 1.5em; 
            margin-bottom: 15px; 
            font-weight: bold;
        }
        
        #restart { 
            margin: 10px; 
            padding: 10px 20px; 
            font-size: 0.9em; 
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: #fff; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        #restart:hover { 
            transform: translateY(-2px);
        }
        
        #instructions { 
            color: #fff; 
            font-size: 0.9em; 
            margin-top: 15px; 
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }
        
        #game-board {
            display: inline-block;
            background: rgba(0, 0, 0, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 10px;
            transition: all 0.3s ease;
            max-width: 100%;
            max-height: 70vh;
        }
        
        #game-board:hover {
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .game-title {
            color: #fff;
            font-size: 2em;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease-in-out infinite;
        }
        
        .grid {
            display: grid;
            gap: 5px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
        }
        
        .cell {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            color: #fff;
            transition: all 0.3s ease;
        }
        
        .cell[data-value="2"] { background: linear-gradient(45deg, #eee4da, #ede0c8); color: #776e65; }
        .cell[data-value="4"] { background: linear-gradient(45deg, #ede0c8, #f2b179); color: #776e65; }
        .cell[data-value="8"] { background: linear-gradient(45deg, #f59563, #f67c5f); color: #f9f6f2; }
        .cell[data-value="16"] { background: linear-gradient(45deg, #f67c5f, #f65e3b); color: #f9f6f2; }
        .cell[data-value="32"] { background: linear-gradient(45deg, #edcf72, #edcc61); color: #f9f6f2; }
        .cell[data-value="64"] { background: linear-gradient(45deg, #edcc61, #edc850); color: #f9f6f2; }
        .cell[data-value="128"] { background: linear-gradient(45deg, #edc53f, #edc22e); color: #f9f6f2; }
        .cell[data-value="256"] { background: linear-gradient(45deg, #edc22e, #3c3a32); color: #f9f6f2; }
        .cell[data-value="512"] { background: linear-gradient(45deg, #3c3a32, #776e65); color: #f9f6f2; }
        .cell[data-value="1024"] { background: linear-gradient(45deg, #776e65, #eee4da); color: #f9f6f2; }
        .cell[data-value="2048"] { background: linear-gradient(45deg, #edc22e, #3c3a32); color: #f9f6f2; }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        #game-container {
            animation: fadeInUp 0.8s ease-out;
        }
        
        @media (max-width: 768px) {
            #game-container {
                padding: 15px;
            }
            
            .game-title {
                font-size: 1.5em;
            }
            
            #score {
                font-size: 1.2em;
            }
            
            #restart {
                padding: 8px 16px;
                font-size: 0.8em;
            }
            
            #instructions {
                font-size: 0.8em;
                padding: 8px;
            }
            
            .cell {
                width: 50px;
                height: 50px;
                font-size: 1.2em;
            }
        }
        
        @media (max-width: 480px) {
            .cell {
                width: 40px;
                height: 40px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body style="background: linear-gradient(135deg, #ff4e50 0%, #f9d423 100%);">
    <div id="game-container">
        <div class="game-title">🔢 2048</div>
        <div id="score">Score: 0</div>
        <button id="restart">Restart Game</button>
        <div id="game-board">
            <div class="grid" id="grid"></div>
        </div>
        <div id="instructions">
            <strong>Controls:</strong><br>
            Use WASD or Arrow Keys to move tiles<br>
            <strong>Goal:</strong> Reach the 2048 tile!
        </div>
    </div>
    <script>
        let board = [];
        let score = 0;
        const size = 4;
        
        function initBoard() {
            board = Array(size).fill().map(() => Array(size).fill(0));
            addRandomTile();
            addRandomTile();
            updateDisplay();
        }
        
        function addRandomTile() {
            const emptyCells = [];
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    if (board[i][j] === 0) {
                        emptyCells.push({i, j});
                    }
                }
            }
            if (emptyCells.length > 0) {
                const {i, j} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[i][j] = Math.random() < 0.9 ? 2 : 4;
            }
        }
        
        function updateDisplay() {
            const grid = document.getElementById('grid');
            grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            grid.innerHTML = '';
            
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const value = board[i][j];
                    if (value !== 0) {
                        cell.textContent = value;
                        cell.setAttribute('data-value', value);
                    }
                    grid.appendChild(cell);
                }
            }
            
            document.getElementById('score').textContent = `Score: ${score}`;
        }
        
        function move(direction) {
            let moved = false;
            const newBoard = board.map(row => [...row]);
            
            if (direction === 'up' || direction === 'down') {
                for (let j = 0; j < size; j++) {
                    const column = [];
                    for (let i = 0; i < size; i++) {
                        if (board[i][j] !== 0) column.push(board[i][j]);
                    }
                    
                    if (direction === 'down') column.reverse();
                    
                    const merged = mergeTiles(column);
                    if (direction === 'down') merged.reverse();
                    
                    for (let i = 0; i < size; i++) {
                        if (newBoard[i][j] !== merged[i]) {
                            moved = true;
                            newBoard[i][j] = merged[i];
                        }
                    }
                }
            } else {
                for (let i = 0; i < size; i++) {
                    const row = board[i].filter(cell => cell !== 0);
                    if (direction === 'right') row.reverse();
                    
                    const merged = mergeTiles(row);
                    if (direction === 'right') merged.reverse();
                    
                    for (let j = 0; j < size; j++) {
                        if (newBoard[i][j] !== merged[j]) {
                            moved = true;
                            newBoard[i][j] = merged[j];
                        }
                    }
                }
            }
            
            if (moved) {
                board = newBoard;
                addRandomTile();
                updateDisplay();
                checkGameOver();
            }
        }
        
        function mergeTiles(tiles) {
            const result = [];
            for (let i = 0; i < tiles.length; i++) {
                if (i < tiles.length - 1 && tiles[i] === tiles[i + 1]) {
                    result.push(tiles[i] * 2);
                    score += tiles[i] * 2;
                    i++;
                } else {
                    result.push(tiles[i]);
                }
            }
            while (result.length < size) {
                result.push(0);
            }
            return result;
        }
        
        function checkGameOver() {
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    if (board[i][j] === 2048) {
                        setTimeout(() => {
                            alert('Congratulations! You reached 2048!');
                        }, 100);
                        return;
                    }
                }
            }
            
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    if (board[i][j] === 0) return;
                    if (i < size - 1 && board[i][j] === board[i + 1][j]) return;
                    if (j < size - 1 && board[i][j] === board[i][j + 1]) return;
                }
            }
            
            setTimeout(() => {
                alert('Game Over! Final Score: ' + score);
            }, 100);
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                e.preventDefault();
                move('up');
            } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
                e.preventDefault();
                move('down');
            } else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                e.preventDefault();
                move('left');
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                e.preventDefault();
                move('right');
            }
        });
        
        document.getElementById('restart').onclick = function() {
            score = 0;
            initBoard();
        };
        
        initBoard();
    </script>
</body>
</html>
