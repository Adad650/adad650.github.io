<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            background: linear-gradient(135deg, #ff4e50 0%, #f9d423 100%);
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        #game-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            max-width: 95vw;
            max-height: 95vh;
        }
        
        #score { 
            color: #fff; 
            font-size: 1.5em; 
            margin-bottom: 15px; 
            font-weight: bold;
        }
        
        #restart { 
            margin: 10px; 
            padding: 10px 20px; 
            font-size: 0.9em; 
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: #fff; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        #restart:hover { 
            transform: translateY(-2px);
        }
        
        #instructions { 
            color: #fff; 
            font-size: 0.9em; 
            margin-top: 15px; 
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }
        
        #game-board {
            display: inline-block;
            background: rgba(0, 0, 0, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 10px;
            transition: all 0.3s ease;
            max-width: 100%;
            max-height: 70vh;
        }
        
        #game-board:hover {
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .game-title {
            color: #fff;
            font-size: 2em;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease-in-out infinite;
        }
        
        .grid {
            display: grid;
            gap: 5px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
        }
        
        .card {
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, #4ecdc4, #45b7d1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.3s ease;
            color: transparent;
            user-select: none;
        }
        
        .card.flipped {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: #fff;
            transform: rotateY(180deg);
        }
        
        .card.matched {
            background: linear-gradient(45deg, #96ceb4, #4ecdc4);
            color: #fff;
            cursor: default;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        #game-container {
            animation: fadeInUp 0.8s ease-out;
        }
        
        @media (max-width: 768px) {
            #game-container {
                padding: 15px;
            }
            
            .game-title {
                font-size: 1.5em;
            }
            
            #score {
                font-size: 1.2em;
            }
            
            #restart {
                padding: 8px 16px;
                font-size: 0.8em;
            }
            
            #instructions {
                font-size: 0.8em;
                padding: 8px;
            }
            
            .card {
                width: 50px;
                height: 50px;
                font-size: 1.2em;
            }
        }
        
        @media (max-width: 480px) {
            .card {
                width: 40px;
                height: 40px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body style="background: linear-gradient(135deg, #ff4e50 0%, #f9d423 100%);">
    <div id="game-container">
        <div class="game-title">🧠 Memory Game</div>
        <div id="score">Moves: 0</div>
        <button id="restart">Restart Game</button>
        <div id="game-board">
            <div class="grid" id="grid"></div>
        </div>
        <div id="instructions">
            <strong>Controls:</strong><br>
            Click cards to flip them<br>
            <strong>Goal:</strong> Find all matching pairs!
        </div>
    </div>
    <script>
        const symbols = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let canFlip = true;
        
        function initGame() {
            cards = [...symbols, ...symbols].sort(() => Math.random() - 0.5);
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            canFlip = true;
            updateDisplay();
            renderCards();
        }
        
        function renderCards() {
            const grid = document.getElementById('grid');
            grid.style.gridTemplateColumns = 'repeat(4, 1fr)';
            grid.innerHTML = '';
            
            cards.forEach((symbol, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.textContent = symbol;
                card.dataset.index = index;
                card.addEventListener('click', () => flipCard(index));
                grid.appendChild(card);
            });
        }
        
        function flipCard(index) {
            if (!canFlip || flippedCards.length >= 2 || cards[index] === null) return;
            
            const card = document.querySelector(`[data-index="${index}"]`);
            card.classList.add('flipped');
            flippedCards.push({ index, symbol: cards[index] });
            
            if (flippedCards.length === 2) {
                moves++;
                updateDisplay();
                canFlip = false;
                
                setTimeout(() => {
                    if (flippedCards[0].symbol === flippedCards[1].symbol) {
                        flippedCards.forEach(({ index }) => {
                            const card = document.querySelector(`[data-index="${index}"]`);
                            card.classList.add('matched');
                            cards[index] = null;
                        });
                        matchedPairs++;
                        
                        if (matchedPairs === symbols.length) {
                            setTimeout(() => {
                                alert(`Congratulations! You won in ${moves} moves!`);
                            }, 500);
                        }
                    } else {
                        flippedCards.forEach(({ index }) => {
                            const card = document.querySelector(`[data-index="${index}"]`);
                            card.classList.remove('flipped');
                        });
                    }
                    
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }
        
        function updateDisplay() {
            document.getElementById('score').textContent = `Moves: ${moves}`;
        }
        
        document.getElementById('restart').onclick = initGame;
        
        initGame();
    </script>
</body>
</html>
