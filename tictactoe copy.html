<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            background: linear-gradient(135deg, #ff4e50 0%, #f9d423 100%);
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        #game-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            max-width: 95vw;
            max-height: 95vh;
        }
        
        #status { 
            color: #fff; 
            font-size: 1.5em; 
            margin-bottom: 15px; 
            font-weight: bold;
        }
        
        #restart { 
            margin: 10px; 
            padding: 10px 20px; 
            font-size: 0.9em; 
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: #fff; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        #restart:hover { 
            transform: translateY(-2px);
        }
        
        #instructions { 
            color: #fff; 
            font-size: 0.9em; 
            margin-top: 15px; 
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }
        
        #game-board {
            display: inline-block;
            background: rgba(0, 0, 0, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 10px;
            transition: all 0.3s ease;
            max-width: 100%;
            max-height: 70vh;
        }
        
        #game-board:hover {
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .game-title {
            color: #fff;
            font-size: 2em;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease-in-out infinite;
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
        }
        
        .cell {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, #4ecdc4, #45b7d1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #fff;
            user-select: none;
        }
        
        .cell:hover {
            background: linear-gradient(45deg, #45b7d1, #4ecdc4);
            transform: scale(1.05);
        }
        
        .cell.x {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: #fff;
        }
        
        .cell.o {
            background: linear-gradient(45deg, #96ceb4, #4ecdc4);
            color: #fff;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        #game-container {
            animation: fadeInUp 0.8s ease-out;
        }
        
        @media (max-width: 768px) {
            #game-container {
                padding: 15px;
            }
            
            .game-title {
                font-size: 1.5em;
            }
            
            #status {
                font-size: 1.2em;
            }
            
            #restart {
                padding: 8px 16px;
                font-size: 0.8em;
            }
            
            #instructions {
                font-size: 0.8em;
                padding: 8px;
            }
            
            .cell {
                width: 60px;
                height: 60px;
                font-size: 2em;
            }
        }
        
        @media (max-width: 480px) {
            .cell {
                width: 50px;
                height: 50px;
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body style="background: linear-gradient(135deg, #ff4e50 0%, #f9d423 100%);">
    <div id="game-container">
        <div class="game-title">⭕ Tic-Tac-Toe</div>
        <div id="status">Player X's turn</div>
        <button id="restart">Restart Game</button>
        <div id="game-board">
            <div class="board" id="board"></div>
        </div>
        <div id="instructions">
            <strong>Controls:</strong><br>
            Click on any empty cell to place your mark<br>
            <strong>Goal:</strong> Get three in a row to win!
        </div>
    </div>
    <script>
        let board = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let gameActive = true;
        
        const winningCombinations = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
            [0, 4, 8], [2, 4, 6] // Diagonals
        ];
        
        function renderBoard() {
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';
            
            board.forEach((cell, index) => {
                const cellElement = document.createElement('div');
                cellElement.className = 'cell';
                cellElement.textContent = cell;
                if (cell === 'X') cellElement.classList.add('x');
                if (cell === 'O') cellElement.classList.add('o');
                cellElement.addEventListener('click', () => makeMove(index));
                boardElement.appendChild(cellElement);
            });
        }
        
        function makeMove(index) {
            if (board[index] === '' && gameActive) {
                board[index] = currentPlayer;
                renderBoard();
                
                if (checkWin()) {
                    document.getElementById('status').textContent = `Player ${currentPlayer} wins!`;
                    gameActive = false;
                } else if (board.every(cell => cell !== '')) {
                    document.getElementById('status').textContent = "It's a draw!";
                    gameActive = false;
                } else {
                    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                    document.getElementById('status').textContent = `Player ${currentPlayer}'s turn`;
                }
            }
        }
        
        function checkWin() {
            return winningCombinations.some(combination => {
                return combination.every(index => {
                    return board[index] === currentPlayer;
                });
            });
        }
        
        function restartGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            gameActive = true;
            document.getElementById('status').textContent = `Player ${currentPlayer}'s turn`;
            renderBoard();
        }
        
        document.getElementById('restart').onclick = restartGame;
        
        renderBoard();
    </script>
</body>
</html>
